<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Wishes</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:
        linear-gradient(135deg,#f5eaea,#f8efef);
    min-height:100vh;
    position:relative;
}

/* =====================================================
   NAVBAR
===================================================== */

.navbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    width:min(92%,1200px);

    padding:18px 40px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:60px;

    background:rgba(255,255,255,0.18);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.3);

    box-shadow:
        0 8px 30px rgba(0,0,0,0.08);

    z-index:999;
}

.logo{
    font-size:1.4rem;
    font-weight:700;
    color:#ff4d92;
}

.nav-links{
    display:flex;
    gap:35px;
}

.nav-links a{
    text-decoration:none;
    color:#764d67;
    font-weight:500;
    transition:0.3s ease;
    position:relative;
}

.nav-links a:hover{
    color:#ff4d92;
}

.nav-links a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-6px;
    width:0%;
    height:2px;
    background:#ff4d92;
    transition:0.3s ease;
}

.nav-links a:hover::after{
    width:100%;
}

/* =====================================================
   HERO
===================================================== */

.hero{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:120px 20px;

    position:relative;

    overflow:hidden;
}
.hero-title{

    text-align:center;

    width:100%;

    font-family:'Dancing Script', cursive;

    font-size:4rem;

    font-weight:700;

    color:#ff4d92;

    margin-top:20px;

    letter-spacing:1px;

    text-shadow:
        0 4px 12px rgba(255,77,146,0.25);

    animation:titleGlow 3s ease-in-out infinite;
}

/* Soft glowing animation */

@keyframes titleGlow{

    0%,100%{
        transform:translateY(0px);
        text-shadow:
            0 4px 12px rgba(255,77,146,0.25);
    }

    50%{
        transform:translateY(-3px);
        text-shadow:
            0 8px 20px rgba(255,77,146,0.4);
    }
}
/* =====================================================
   BUNTING
===================================================== */

.bunting{
    position:absolute;
    top:90px;
    left:0;
    width:100%;
    z-index:5;

    animation:swing 6s ease-in-out infinite;
}

.rope{
    width:90%;
    height:2px;
    background:#cbb2b2;

    margin:auto;
}

.flags{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:4px;
}

.flag{
    width:0;
    height:0;

    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:40px solid;
}

.flag:nth-child(1){border-top-color:#1bc7c9;}
.flag:nth-child(2){border-top-color:#f6d14b;}
.flag:nth-child(3){border-top-color:#ff9d5f;}
.flag:nth-child(4){border-top-color:#8d66cb;}
.flag:nth-child(5){border-top-color:#19b8e8;}
.flag:nth-child(6){border-top-color:#ff69a6;}
.flag:nth-child(7){border-top-color:#1bc7c9;}
.flag:nth-child(8){border-top-color:#f6d14b;}
.flag:nth-child(9){border-top-color:#ff9d5f;}
.flag:nth-child(10){border-top-color:#8d66cb;}
.flag:nth-child(11){border-top-color:#19b8e8;}
.flag:nth-child(12){border-top-color:#ff69a6;}

/* =====================================================
   BALLOONS
===================================================== */

.balloon{
    position:absolute;
    border-radius:50%;

    animation:float 6s ease-in-out infinite;

    box-shadow:
        inset -10px -10px 20px rgba(0,0,0,0.08),
        0 20px 35px rgba(0,0,0,0.12);
}

.balloon::before{
    content:"";
    position:absolute;

    width:30%;
    height:30%;

    border-radius:50%;

    background:rgba(255,255,255,0.7);

    top:20%;
    left:20%;
}

.balloon::after{
    content:"";
    position:absolute;

    width:2px;
    height:120px;

    background:#bca9a9;

    left:50%;
    bottom:-120px;

    transform:translateX(-50%);
}

/* Left balloons */

.yellow-left{
    width:170px;
    height:210px;

    top:70px;
    left:-40px;

    background:
        radial-gradient(circle at 30% 30%,
        #fff6b3,
        #ffd31f 65%,
        #d5a000);
}

.silver-left{
    width:145px;
    height:185px;

    top:340px;
    left:-50px;

    background:
        radial-gradient(circle at 30% 30%,
        #ffffff,
        #d9d9d9 65%,
        #ababab);
}

.teal-left{
    width:135px;
    height:170px;

    bottom:-20px;
    left:-35px;

    background:
        radial-gradient(circle at 30% 30%,
        #abffff,
        #0fc7c8 65%,
        #0b8c8f);
}

/* Right balloons */

.teal-right{
    width:145px;
    height:180px;

    top:70px;
    right:-35px;

    background:
        radial-gradient(circle at 30% 30%,
        #abffff,
        #0fc7c8 65%,
        #0b8c8f);
}

.yellow-right{
    width:160px;
    height:200px;

    top:250px;
    right:-45px;

    background:
        radial-gradient(circle at 30% 30%,
        #fff6b3,
        #ffd31f 65%,
        #d5a000);
}

.pink-right{
    width:180px;
    height:220px;

    bottom:-40px;
    right:-45px;

    background:
        radial-gradient(circle at 30% 30%,
        #ffd4e6,
        #ff4d9a 65%,
        #d62873);
}

/* =====================================================
   CONTENT
===================================================== */

.hero-content{
    max-width:900px;
    position:relative;
    z-index:10;
}

.small-heading{
    letter-spacing:8px;
    color:#7e4f6c;
    margin-bottom:12px;
}

.main-title{
    font-family:'Dancing Script',cursive;
    font-size:7rem;
    color:#ff4d92;

    line-height:1;

    margin-bottom:35px;

    text-shadow:
        0 12px 25px rgba(255,77,146,0.18);
}

.message{
    color:#764d67;

    font-size:1.2rem;

    line-height:2;

    text-transform:uppercase;

    font-weight:500;
}

/* =====================================================
   BUTTONS
===================================================== */

.hero-buttons{
    margin-top:45px;

    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    padding:16px 34px;

    border:none;
    border-radius:60px;

    font-size:1rem;
    font-weight:600;

    cursor:pointer;

    transition:0.35s ease;
}

.btn:hover{
    transform:
        translateY(-4px)
        scale(1.04);
}

.btn-primary{
    background:
        linear-gradient(135deg,#ff5ea5,#ff3e88);

    color:white;

    box-shadow:
        0 12px 30px rgba(255,77,146,0.35);
}

.btn-secondary{
    background:rgba(255,255,255,0.55);

    backdrop-filter:blur(8px);

    color:#764d67;

    border:1px solid rgba(255,255,255,0.4);
}

/* =====================================================
   POPUP OVERLAY
===================================================== */

.birthday-popup-overlay{
    position:fixed;
    inset:0;

    background:rgba(20,15,20,0.38);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:99999;

    opacity:0;
    visibility:hidden;

    transition:0.45s ease;
}

.birthday-popup-overlay.active{
    opacity:1;
    visibility:visible;
}

/* =====================================================
   POPUP LETTER
===================================================== */

.birthday-letter-popup{
    position:relative;

    width:min(92vw,680px);

    min-height:480px;

    padding:55px 50px;

    border-radius:32px;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,0.95),
            rgba(255,245,248,0.96)
        );

    box-shadow:
        0 25px 60px rgba(0,0,0,0.18),
        inset 0 0 25px rgba(255,255,255,0.7);

    overflow:hidden;

    transform:
        scale(0.75)
        translateY(40px);

    opacity:0;

    transition:
        transform 0.55s cubic-bezier(.22,1,.36,1),
        opacity 0.55s ease;
}

.birthday-popup-overlay.active .birthday-letter-popup{
    transform:
        scale(1)
        translateY(0);

    opacity:1;
}

/* Paper Texture */

.birthday-letter-popup::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.65), transparent 22%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.45), transparent 18%);
}

/* =====================================================
   CLOSE BUTTON
===================================================== */

.popup-close-btn{
    position:absolute;
    top:18px;
    right:18px;

    width:44px;
    height:44px;

    border:none;
    border-radius:50%;

    background:white;

    color:#7b4e68;

    font-size:1.6rem;

    cursor:pointer;

    box-shadow:
        0 8px 18px rgba(0,0,0,0.12);

    transition:0.3s ease;
}

.popup-close-btn:hover{
    transform:
        rotate(90deg)
        scale(1.08);
}

/* =====================================================
   DECORATIONS
===================================================== */

.corner-decoration{
    position:absolute;
    font-size:1.6rem;

    animation:floatSmall 3s ease-in-out infinite;
}

.top-left{
    top:22px;
    left:24px;
}

.top-right{
    top:22px;
    right:80px;
}

.bottom-left{
    bottom:22px;
    left:24px;
}

.bottom-right{
    bottom:22px;
    right:24px;
}

/* =====================================================
   LETTER CONTENT
===================================================== */

.popup-letter-content{
    position:relative;
    z-index:5;
}

.popup-letter-title{
    font-family:'Dancing Script',cursive;

    font-size:3rem;

    color:#ff4d92;

    margin-bottom:30px;

    text-align:center;
}

.popup-letter-message{
    color:#6f4c62;

    font-size:1.12rem;

    line-height:2.1;

    white-space:pre-wrap;

    min-height:220px;
}

.popup-letter-sign{
    margin-top:30px;

    text-align:right;

    color:#7c5570;

    font-size:1.08rem;

    line-height:1.8;
}

.popup-letter-sign span{
    font-family:'Dancing Script',cursive;

    font-size:2rem;

    color:#ff4d92;
}

/* =====================================================
   PARTICLES
===================================================== */

.popup-particles{
    position:absolute;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.popup-heart{
    position:absolute;
    animation:popupHeartFloat linear forwards;
}

@keyframes popupHeartFloat{

    0%{
        transform:
            translateY(0)
            scale(0.5);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:
            translateY(-260px)
            scale(1.3)
            rotate(20deg);
        opacity:0;
    }
}

/* =====================================================
   ANIMATIONS
===================================================== */

@keyframes float{

    0%,100%{
        transform:
            translateY(0px);
    }

    50%{
        transform:
            translateY(-18px);
    }
}

@keyframes swing{

    0%,100%{
        transform:rotate(0deg);
    }

    50%{
        transform:rotate(-0.6deg);
    }
}

@keyframes floatSmall{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-5px);
    }
}



/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:768px){

    .nav-links{
        display:none;
    }

    .main-title{
        font-size:4.5rem;
    }

    .message{
        font-size:0.92rem;
        line-height:1.8;
    }

    .birthday-letter-popup{
        padding:45px 28px;
    }
}

@media(max-width:480px){

    .main-title{
        font-size:3.5rem;
    }

    .message{
        font-size:0.8rem;
    }

    .hero-buttons{
        flex-direction:column;
    }

    .btn{
        width:220px;
    }

    .birthday-letter-popup{
        padding:42px 22px;
        border-radius:24px;
    }

    .popup-letter-title{
        font-size:2rem;
    }

    .popup-letter-message{
        font-size:0.9rem;
        line-height:1.8;
    }
}

</style>
</head>

<body>

<!-- =====================================================
   NAVBAR
===================================================== -->

<header class="hero-title">
<div class="navbar">
    <div class="logo">
       Happy Birthday Thangamee!!!
    </div>
 </div>

    

</header>

<!-- =====================================================
   HERO
===================================================== -->

<section class="hero">

    <!-- BUNTING -->

    <div class="bunting">

        <div class="rope"></div>

        <div class="flags">
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
        </div>

    </div>

    <!-- BALLOONS -->

    <div class="balloon yellow-left"></div>
    <div class="balloon silver-left"></div>
    <div class="balloon teal-left"></div>

    <div class="balloon teal-right"></div>
    <div class="balloon yellow-right"></div>
    <div class="balloon pink-right"></div>

    <!-- CONTENT -->

    <div class="hero-content">

        

        <h1 class="main-title">
           Turning 21!
        </h1>

        <div class="message">

           I am very lucky to have u my best friend and love<br>

           i always with u as a friend and partner<br>

          we will fight more and more at that time we will care about our relationship  <3 <br>

            I Love You chello! 

           <br>

            HAPPY BIRTHDAY!

        </div>

        <div class="hero-buttons">

            <button class="btn btn-primary" id="sendWishBtn">
                idhai thottal u will be happy
            </button>

            <button class="btn btn-secondary" onclick="window.location.href='bday.html'">
               Puzzle Game with photos!!
            </button>

        </div>

    </div>

</section>

<!-- =====================================================
   LETTER POPUP
===================================================== -->

<div class="birthday-popup-overlay" id="birthdayPopupOverlay">

    <div class="popup-particles" id="popupParticles"></div>

    <div class="birthday-letter-popup">

        <button class="popup-close-btn" id="popupCloseBtn">
            &times;
        </button>

        <div class="corner-decoration top-left">💖</div>
        <div class="corner-decoration top-right">✨</div>
        <div class="corner-decoration bottom-left">🌸</div>
        <div class="corner-decoration bottom-right">💕</div>

        <div class="popup-letter-content">

            <h2 class="popup-letter-title">
                Hey my Aadhan ,
            </h2>

            <div class="popup-letter-message" id="popupTypewriterText"></div>

            <div class="popup-letter-sign">
                With love,<br>
                <span>Iniya</span>
            </div>

        </div>

    </div>

</div>

<script>

/* =====================================================
   ELEMENTS
===================================================== */


const sendWishesButton =
    document.getElementById("sendWishBtn");

const birthdayOverlay =
    document.getElementById("birthdayPopupOverlay");

const popupCloseButton =
    document.getElementById("popupCloseBtn");

const popupTypewriter =
    document.getElementById("popupTypewriterText");

const popupParticles =
    document.getElementById("popupParticles");

/* =====================================================
   MESSAGE
===================================================== */

const popupMessage = `My Baby! I Love u di chello,Wish u many more happy returns of the day da!U r my special person  past,present and future da siripa irukum paravala sirichiko , na romba tholla kuduthuruken ellathaium ne adjust pannitu irundhuruka thank u for that da, 
 enakaga ne evlo mathiruka unnaiya very good d chello ne ,un life la ne epome happy ah irukanum ne irukura place epome gala gala nu irukum adhu enaku pudikum romba , un life la ne nenachadhu ellam nadakanum kandipa nadakum ummahhhhh ,unaku na kedachadhu varam, unna vida na dha
  love pandren unaku theridha kooda therila enaku,na therila nu , mm nu sonna unaku pudikadhu irundhalum na solluven ne veruppu aaguva adhu enaku romba pudikum ,I LOVE U ,Once again Happy Birthday chelloooo ❤️`

/* =====================================================
   OPEN POPUP
===================================================== */

sendWishesButton.addEventListener("click", () => {

    birthdayOverlay.classList.add("active");

    document.body.style.overflow = "hidden";

    popupTypewriter.innerHTML = "";

    startTyping();

    startParticles();
});

/* =====================================================
   CLOSE POPUP
===================================================== */

function closePopup(){

    birthdayOverlay.classList.remove("active");

    document.body.style.overflow = "auto";

    popupTypewriter.innerHTML = "";
}

popupCloseButton.addEventListener(
    "click",
    closePopup
);

birthdayOverlay.addEventListener(
    "click",
    (e) => {

        if(e.target === birthdayOverlay){

            closePopup();
        }
    }
);

/* ESC CLOSE */

document.addEventListener(
    "keydown",
    (e) => {

        if(
            e.key === "Escape" &&
            birthdayOverlay.classList.contains("active")
        ){

            closePopup();
        }
    }
);

/* =====================================================
   TYPEWRITER
===================================================== */

function startTyping(){

    let index = 0;

    function type(){

        if(index < popupMessage.length){

            popupTypewriter.innerHTML +=
                popupMessage.charAt(index);

            index++;

            setTimeout(type,28);
        }
    }

    setTimeout(type,400);
}

/* =====================================================
   PARTICLES
===================================================== */

function startParticles(){

    const interval = setInterval(() => {

        if(
            !birthdayOverlay.classList.contains("active")
        ){

            clearInterval(interval);

            return;
        }

        const particle =
            document.createElement("div");

        particle.classList.add("popup-heart");

        particle.innerHTML =
            ["❤️","💖","✨","💕","🌸"][
                Math.floor(Math.random() * 5)
            ];

        particle.style.left =
            Math.random() * 100 + "vw";

        particle.style.bottom =
            "0px";

        particle.style.fontSize =
            (14 + Math.random() * 18) + "px";

        particle.style.animationDuration =
            (3 + Math.random() * 3) + "s";

        popupParticles.appendChild(particle);

        setTimeout(() => {

            particle.remove();

        },6000);

    },260);
}

</script>

</body>
</html>
